
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080" 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    networks:
      - app-network

  goose:
    image: golang:1.26.3-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    env_file:
      - .env
    command: >
      sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest &&
      goose -dir /migrations postgres \"postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/$$POSTGRES_DB?sslmode=disable\" up"
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT_EXTERNAL:-6380}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network


  waha:
    image: devlikeapro/waha
    env_file:
      - .env
    ports:
      - "${WAHA_PORT:-3000}:3000"
    volumes:
      - waha-data:/app/.waha
    networks:
      - app-network

  n8n:
    image: n8nio/n8n
    ports:
      - "${N8N_PORT_EXTERNAL:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:${N8N_PORT_EXTERNAL:-5678}/
      - GENERIC_TIMEZONE=Asia/Jakarta
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3001}:5173" 
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  waha-data:
  n8n-data:

networks:
  app-network:
    driver: bridge
